apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wire-enterprise
  namespace: argocd
spec:
  project: wire-project
  source:
    repoURL: 'https://github.com/organization/wire-enterprise.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
