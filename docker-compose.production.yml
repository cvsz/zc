services:
  api:
    build: .
    image: zc-enterprise:local
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "2"
      - --proxy-headers
      - --forwarded-allow-ips=172.16.0.0/12
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      AUTH_REQUIRED: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CORS_ORIGINS: https://zai.zeaz.dev
      REDIS_URL: redis://valkey:6379/0
      REDIS_ENABLED: "true"
      NATS_URL: nats://nats:4222
      NATS_ENABLED: "true"
      STORAGE_BACKEND: s3
      STORAGE_S3_BUCKET: zc-uploads
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      PROTOBUF_ENABLED: "false"
    depends_on:
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - zc-data:/app/data
    expose:
      - "8000"
    restart: unless-stopped

  web:
    build: .
    image: zc-enterprise:local
    command:
      - python
      - -m
      - uvicorn
      - webapp.backend.server:app
      - --host
      - 0.0.0.0
      - --port
      - "8420"
      - --proxy-headers
      - --forwarded-allow-ips=172.16.0.0/12
    environment:
      ZC_API_URL: https://api.zeaz.dev
    expose:
      - "8420"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
      - web
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./deploy/nginx/zc.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - valkey-data:/data
    restart: unless-stopped

  nats:
    image: nats:2.11-alpine
    command: ["--jetstream", "--store_dir=/data"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - nats-data:/data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - minio-data:/data
    restart: unless-stopped

volumes:
  zc-data:
  valkey-data:
  nats-data:
  minio-data:
