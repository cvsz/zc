services:
  zc:
    build: .
    image: zcoder:local
    container_name: zc
    network_mode: host
    command:
      - python
      - -m
      - uvicorn
      - app.main:app
      - --host
      - 127.0.0.1
      - --port
      - "8000"
      - --workers
      - "1"
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      AUTH_REQUIRED: "true"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
      AI_PROVIDER: ${AI_PROVIDER:-litellm}
      LITELLM_CONFIG_PATH: /app/litellm-config.yaml
      LITELLM_MODEL: ${LITELLM_MODEL:-zc-default}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORAGE_BACKEND: local
      UPLOAD_TEMP_DIR: /app/data/uploads
      CHAT_SESSION_DIR: /app/data/chat/sessions
      REDIS_ENABLED: "false"
      NATS_ENABLED: "false"
      PROTOBUF_ENABLED: "false"
      OTEL_ENABLED: "false"
      RATE_LIMIT_ENABLED: "true"
      CONTROL_PANEL_ENABLED: "true"
      FRONTEND_ENABLED: "true"
      API_HOST: 127.0.0.1
      API_PORT: "8000"
      API_WORKERS: "1"
    volumes:
      - zc-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

volumes:
  zc-data:
