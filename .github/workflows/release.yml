name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.33.0 && git push origin v1.33.0
#
# A tag push is an explicit publication action. This workflow verifies the
# supported package and container before publishing the image and release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v1.33.0"
        required: true

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  test:
    # Tag pushes don't trigger ci.yml (its push trigger is branches: [main]
    # only), so this is a standalone gate — nothing gets released untested.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]  # floor + ceiling of requires-python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt -r webapp/requirements-web.txt
      - name: Verify release tag matches package version
        run: |
          test "$RELEASE_TAG" = "v$(python -c 'from app.core.config import APP_VERSION; print(APP_VERSION)')"
      - run: ruff check .
      - run: ruff format --check app tests
      - run: mypy app
      - run: bandit -q -c pyproject.toml -r app src/wire webapp/backend
      - run: pytest --cov --cov-report=term-missing
      - run: pip install .
      - run: pip check
      - run: zc --help && zc-legacy --help
      - run: python -c "import app.main, app.grpc.wire_servicer, app.services.delta.sync_service, webapp.backend.server, wire.main"

  package:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@1e60f620b9541d4d100c1fa0b82bf8b88abfb4ae # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: webapp/frontend-src/package-lock.json
      - run: make package-wheel
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-wheel
          path: dist/*.whl
          if-no-files-found: error

  publish-image:
    needs: [test, package]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - id: version
        run: echo "value=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Verify production image before publication
        run: |
          set -euo pipefail
          docker build -t zcoder:release-candidate .
          docker run -d --rm \
            --name zcoder-release-smoke \
            --network host \
            -e ENVIRONMENT=production \
            -e DEBUG=false \
            -e AUTH_REQUIRED=true \
            -e CLOUDFLARE_ACCESS_REQUIRED=true \
            -e CLOUDFLARE_ACCESS_TEAM_DOMAIN=https://release-ci.cloudflareaccess.com \
            -e CLOUDFLARE_ACCESS_AUD=release-ci-audience \
            -e JWT_SECRET=release-ci-jwt-secret-with-at-least-32-characters \
            -e E2E_SECRET_KEY=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY= \
            -e CORS_ORIGINS=https://zeaz.dev \
            -e AI_PROVIDER=litellm \
            -e LITELLM_CONFIG_PATH=/app/litellm-config.yaml \
            -e LITELLM_MODEL=zc-default \
            -e RATE_LIMIT_ENABLED=true \
            -e STRICT_READINESS=true \
            -e PROTOBUF_ENABLED=false \
            -e ANTHROPIC_API_KEY=sk-ant-release-smoke-test-dummy-key \
            zcoder:release-candidate
          trap 'docker stop zcoder-release-smoke >/dev/null 2>&1 || true' EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/ready >/dev/null; then
              test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
                http://127.0.0.1:8000/)" = "401"
              ! docker logs zcoder-release-smoke 2>&1 | grep -E 'WARNING|Traceback'
              exit 0
            fi
            sleep 2
          done
          docker logs zcoder-release-smoke
          exit 1

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}

      # Same smoke test as ci.yml's docker-build job, run again here
      # against the exact image that just got pushed, not a fresh local
      # build — catches anything registry push/pull could change.
      - run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=sk-ant-ci-smoke-test-dummy-key \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }} \
            python -c "from app.main import app; assert app.title == 'zcoder'"

      - name: Record immutable release image digest
        run: echo "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

  github-release:
    needs: [test, package, publish-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-wheel
          path: dist
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${RELEASE_TAG}" dist/*.whl \
            --verify-tag \
            --title "zc ${RELEASE_TAG}" \
            --generate-notes \
            --notes "Docker image: ghcr.io/${{ github.repository }}:${RELEASE_TAG#v}"
