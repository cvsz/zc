name: Release

# Triggered by pushing a version tag, e.g.:
#   git tag v1.33.0 && git push origin v1.33.0
#
# NOTE on scope: this builds and publishes the Docker image (verified to
# work — the Dockerfile COPYs the whole tree rather than relying on
# setuptools package discovery) and cuts a GitHub Release with the source
# archive. It deliberately does NOT run `python -m build` to produce a
# PyPI-style wheel/sdist: the project's ~65 root-level modules
# (main.py, zc_*.py, ...) are flat files, not a package directory, and
# pyproject.toml has no [tool.setuptools] py-modules/packages declaration
# telling setuptools which of them to include. Without that, a wheel build
# would either fail or silently produce a near-empty artifact. Fixing that
# is a packaging-layout change, not a CI change — see the audit report.
# Until then, `pip install -r requirements.txt` + running from a checkout
# (exactly what every job below and in ci.yml already does) is the
# supported install path, matching README.md/Makefile's own `make install`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)release, e.g. v1.33.0"
        required: true

permissions:
  contents: read

jobs:
  test:
    # Tag pushes don't trigger ci.yml (its push trigger is branches: [main]
    # only), so this is a standalone gate — nothing gets released untested.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]  # floor + ceiling of requires-python
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt -r webapp/requirements-web.txt
      - run: ruff check .
      - run: black --check src app webapp scripts tests google ./*.py
      - run: mypy . --ignore-missing-imports
      - run: bandit -r src app webapp scripts ./*.py -ll -x tests
      - run: pytest --cov --cov-report=term-missing

  publish-image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}:latest

      # Same smoke test as ci.yml's docker-build job, run again here
      # against the exact image that just got pushed, not a fresh local
      # build — catches anything registry push/pull could change.
      - run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=sk-ant-ci-smoke-test-dummy-key \
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }} \
            python -c "from app.main import app; assert app.title == 'zcoder'"

      - name: Record immutable release image digest
        run: echo "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"

  github-release:
    needs: [test, publish-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "wire ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "Docker image: ghcr.io/${{ github.repository }}:${GITHUB_REF_NAME#v}"
