name: CodeQL

# Complements the fast `bandit` pass in ci.yml with GitHub's deeper,
# semantic (not just pattern-matching) analysis engine. Runs on every push/PR
# to main plus a weekly scheduled scan so newly-disclosed query patterns get
# applied to existing code, not just new commits.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"  # Mondays 03:17 UTC — off-peak, arbitrary offset to avoid the top-of-hour queue
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
