name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: black --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      # matches `make typecheck`; was previously only run locally, never enforced in CI
      - run: mypy . --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      # -ll: only fail on medium+ severity; -x tests: don't scan the test suite itself
      - run: bandit -r . -ll -x ./tests,./build,./dist

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - run: pytest --ignore=tests/test_webapp_server.py --cov --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  test-webapp:
    # tests/test_webapp_server.py needs fastapi + httpx (for FastAPI's
    # TestClient) which the main `test` job above doesn't install, so this
    # file was not actually exercised by any existing CI job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt -r webapp/requirements-web.txt httpx
      - run: pytest tests/test_webapp_server.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t wire:ci .
      - run: docker run --rm wire:ci --version
      # Startup + health smoke test: a dummy key is enough here because
      # `--health-check` (shallow) only checks that a key is *configured*,
      # not that it's valid — the live-API check only runs under
      # --health-check-deep (health.py: run_health_check(deep=...)).
      # main.py exits 1 if any check fails, so this genuinely fails CI
      # on a broken image rather than always reporting green.
      - run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=sk-ant-ci-smoke-test-dummy-key \
            wire:ci --health-check
