name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - name: Detect changed Python files
        id: changed-python
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          files="$(git diff --name-only "$base" "$head" -- '*.py' '*.pyi' || true)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files" > /tmp/changed-python-files.txt
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            : > /tmp/changed-python-files.txt
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Black check changed Python files
        if: steps.changed-python.outputs.has_python == 'true'
        shell: bash
        run: black --check $(cat /tmp/changed-python-files.txt)

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      # matches `make typecheck`; was previously only run locally, never enforced in CI
      - run: mypy . --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Detect changed Python files
        id: changed-python
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          files="$(git diff --name-only "$base" "$head" -- '*.py' '*.pyi' || true)"
          if [ -n "$files" ]; then
            printf '%s\n' "$files" > /tmp/changed-python-files.txt
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            : > /tmp/changed-python-files.txt
            echo "has_python=false" >> "$GITHUB_OUTPUT"
          fi
      # -ll: only fail on medium+ severity; scan only changed Python files so
      # repo-wide legacy warnings do not block unrelated workflow/config PRs.
      - name: Bandit scan changed Python files
        if: steps.changed-python.outputs.has_python == 'true'
        shell: bash
        run: bandit -ll -x tests $(cat /tmp/changed-python-files.txt)

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-dev.txt
      - run: pytest --ignore=tests/test_webapp_server.py --cov --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  test-webapp:
    # tests/test_webapp_server.py needs fastapi + httpx (for FastAPI's
    # TestClient) which the main `test` job above doesn't install, so this
    # file was not actually exercised by any existing CI job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt -r webapp/requirements-web.txt httpx
      - run: pytest tests/test_webapp_server.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t wire:ci .
      - run: docker run --rm wire:ci python --version
      - name: Start container
        run: |
          docker run -d --rm \
            --name wire-ci-smoke \
            -p 8420:8420 \
            -e ANTHROPIC_API_KEY=sk-ant-ci-smoke-test-dummy-key \
            wire:ci
      - name: Wait for readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8420/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs wire-ci-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker stop wire-ci-smoke
