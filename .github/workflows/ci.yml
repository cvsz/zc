name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - name: Ruff format check supported runtime and regression tests
        run: ruff format --check app tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Mypy supported runtime
        run: mypy app

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Bandit full executable Python surface scan
        run: bandit -q -c pyproject.toml -r app src/wire webapp/backend

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - run: git config diff.renameLimit 20000
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - run: pip check
      - name: Verify installed console commands
        run: |
          zc --help
          zcoder --help
          zc-legacy --help
      - name: Verify installed runtime imports
        run: |
          python -c "import app.main, app.grpc.wire_servicer, app.services.delta.sync_service"
          python -c "import webapp.backend.server, wire.main"
      - name: Verify package metadata
        run: python -c "from importlib.metadata import version; assert version('zcoder') == '1.33.0'"
      - name: Verify wheel contains only current supported sources
        run: make package-wheel

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest --ignore=tests/test_webapp_server.py --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=70
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  test-webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt -r webapp/requirements-web.txt httpx
      - run: pytest tests/test_webapp_server.py -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp/frontend-src
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: npm ci
      - run: npm test -- --run
      - run: npm run typecheck
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, package-smoke, frontend]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - run: docker build -t zcoder:ci .
      - run: docker run --rm zcoder:ci python --version
      - name: Start production-profile container
        run: |
          docker run -d --rm \
            --name zcoder-ci-smoke \
            --network host \
            -e ENVIRONMENT=production \
            -e DEBUG=false \
            -e AUTH_REQUIRED=true \
            -e CLOUDFLARE_ACCESS_REQUIRED=true \
            -e CLOUDFLARE_ACCESS_TEAM_DOMAIN=https://ci.cloudflareaccess.com \
            -e CLOUDFLARE_ACCESS_AUD=ci-audience \
            -e JWT_SECRET=ci-only-jwt-secret-with-at-least-32-characters \
            -e E2E_SECRET_KEY=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY= \
            -e CORS_ORIGINS=https://zeaz.dev \
            -e AI_PROVIDER=litellm \
            -e LITELLM_CONFIG_PATH=/app/litellm-config.yaml \
            -e LITELLM_MODEL=zc-default \
            -e RATE_LIMIT_ENABLED=true \
            -e STRICT_READINESS=true \
            -e PROTOBUF_ENABLED=false \
            -e ANTHROPIC_API_KEY=sk-ant-ci-smoke-test-dummy-key \
            zcoder:ci
      - name: Wait for readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/ready >/dev/null; then
              curl -fsS http://127.0.0.1:8000/v1/wire/health/live >/dev/null
              test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
                http://127.0.0.1:8000/)" = "401"
              ! docker logs zcoder-ci-smoke 2>&1 | grep -E 'WARNING|Traceback'
              exit 0
            fi
            sleep 2
          done
          docker logs zcoder-ci-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker stop zcoder-ci-smoke
