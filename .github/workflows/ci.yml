name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - name: Black check supported runtime and tests
        run: black --check app tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: mypy . --ignore-missing-imports

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Bandit full supported runtime scan
        run: bandit -r app -ll

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install .
      - name: Verify installed console commands
        run: |
          zc --help
          zcoder --help
      - name: Verify package metadata
        run: python -c "from importlib.metadata import version; assert version('zcoder') == '1.33.0'"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest --ignore=tests/test_webapp_server.py --cov --cov-report=xml --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml

  test-webapp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt -r webapp/requirements-web.txt httpx
      - run: pytest tests/test_webapp_server.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, package-smoke]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t zcoder:ci .
      - run: docker run --rm zcoder:ci python --version
      - name: Start container
        run: |
          docker run -d --rm \
            --name zcoder-ci-smoke \
            -p 8000:8000 \
            -e ANTHROPIC_API_KEY=sk-ant-ci-smoke-test-dummy-key \
            zcoder:ci
      - name: Wait for readiness
        shell: bash
        run: |
          set -euo pipefail
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/ready >/dev/null; then
              curl -fsS http://127.0.0.1:8000/v1/wire/health/live >/dev/null
              exit 0
            fi
            sleep 2
          done
          docker logs zcoder-ci-smoke
          exit 1
      - name: Stop smoke container
        if: always()
        run: docker stop zcoder-ci-smoke
