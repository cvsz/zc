[tool.ruff]
exclude = [".web-venv", ".venv", "build", "dist"]

[tool.ruff.lint]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101"]
"app/proto/**/*.py" = ["E501", "F401"]

[tool.bandit]
exclude_dirs = ["tests", ".web-venv", ".venv", "app/proto"]
skips = ["B101"]

[tool.mypy]
exclude = [
    "google",
    "app/proto",
]
