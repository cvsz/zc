# Kernel Performance Tuning for Enterprise Wire API
# Optimized for high-throughput QUIC/HTTP3, zero-copy I/O, and low-latency networking
# Apply with: sudo sysctl -p /etc/sysctl.d/99-wire-api.conf

# =============================================================================
# NETWORK OPTIMIZATIONS
# =============================================================================

# Increase TCP buffer sizes for high-bandwidth connections
net.core.rmem_default = 262144
net.core.rmem_max = 134217728
net.core.wmem_default = 262144
net.core.wmem_max = 134217728

# Enable TCP window scaling for better throughput
net.ipv4.tcp_window_scaling = 1

# Increase maximum number of connections queue
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# Enable fast socket recycling
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15

# Keepalive tuning for persistent connections
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 3

# Disable slow start after idle for better performance
net.ipv4.tcp_slow_start_after_idle = 0

# Enable TCP Fast Open (reduces connection latency)
net.ipv4.tcp_fastopen = 3

# Increase local port range
net.ipv4.ip_local_port_range = 1024 65535

# Optimize UDP buffers for QUIC/HTTP3
net.core.udp_mem = 134217728 268435456 536870912
net.ipv4.udp_mem = 134217728 268435456 536870912

# =============================================================================
# FILE SYSTEM & I/O OPTIMIZATIONS
# =============================================================================

# Increase file descriptor limits
fs.file-max = 2097152
fs.nr_open = 2097152

# Optimize inotify for file watching (if used)
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 8192

# Increase AIO max for async I/O operations
fs.aio-max-nr = 1048576

# Optimize VM dirty writeback
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 3000
vm.dirty_writeback_centisecs = 500

# =============================================================================
# MEMORY OPTIMIZATIONS
# =============================================================================

# Overcommit memory for better performance (use with caution)
vm.overcommit_memory = 1

# Reduce swappiness to keep application in memory
vm.swappiness = 10

# Increase mmap limits for zero-copy file operations
vm.max_map_count = 262144

# Transparent huge pages (disable for database workloads, enable for others)
# vm.transparent_hugepage = always

# =============================================================================
# CONNECTION TRACKING (for high-connection scenarios)
# =============================================================================

# Increase connection tracking table size
net.netfilter.nf_conntrack_max = 1048576
net.netfilter.nf_conntrack_buckets = 262144
net.netfilter.nf_conntrack_tcp_timeout_established = 432000
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30

# =============================================================================
# INTERRUPT & CPU OPTIMIZATIONS
# =============================================================================

# Enable busy polling for network devices (reduces interrupt overhead)
net.core.busy_poll = 50
net.core.busy_read = 50

# Network device budget for polling
net.core.netdev_budget = 600
net.core.netdev_budget_usecs = 8000

# =============================================================================
# ADDITIONAL TUNING FOR CONTAINERIZED ENVIRONMENTS
# =============================================================================

# Allow binding to non-local IPs (useful in Kubernetes)
net.ipv4.ip_nonlocal_bind = 1

# Enable proxy protocol support if behind load balancer
# net.ipv4.tcp_proxy_protocol = 1

# Disable ICMP redirects (security + performance)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# Enable source routing (required for some CNI plugins)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# =============================================================================
# POST-APPLY VERIFICATION COMMANDS
# =============================================================================
# 
# After applying these settings, verify with:
#
# # Check TCP buffer sizes
# sysctl net.core.rmem_max net.core.wmem_max
#
# # Check connection queue limits
# sysctl net.core.somaxconn net.ipv4.tcp_max_syn_backlog
#
# # Check file descriptor limits
# ulimit -n
# cat /proc/sys/fs/file-max
#
# # Monitor network stats
# watch -n1 'netstat -s | grep -E "segments|connections"'
#
# # Check active connections
# ss -s
#
# =============================================================================
# SYSTEMD SERVICE OVERRIDES (Optional)
# =============================================================================
#
# For uvicorn/gunicorn services, create /etc/systemd/system/wire-api.service.d/override.conf:
#
# [Service]
# LimitNOFILE=1048576
# LimitNPROC=65535
# Environment="UVLOOP_FAST=1"
# Environment="PYTHONUNBUFFERED=1"
#
# Then reload: systemctl daemon-reload && systemctl restart wire-api
#
# =============================================================================
