apiVersion: apps/v1
kind: Deployment
metadata:
  name: wire-workers
  labels:
    app: wire-workers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wire-workers
  template:
    metadata:
      labels:
        app: wire-workers
    spec:
      containers:
      - name: upload-processor
        image: wire:latest
        command: ["python", "-m", "app.workers.upload_processor"]
        env:
        - name: S3_BUCKET
          value: "wire-uploads"
        - name: NATS_URL
          value: "nats://nats:4222"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
