apiVersion: apps/v1
kind: Deployment
metadata:
  name: wire-api
  labels:
    app: wire-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: wire-api
  template:
    metadata:
      labels:
        app: wire-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: wire-api
        image: wire:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000 # HTTP
        - containerPort: 8001 # gRPC
        env:
        - name: S3_BUCKET
          value: "wire-uploads"
        - name: NATS_URL
          value: "nats://nats:4222"
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wire-api-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wire-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
