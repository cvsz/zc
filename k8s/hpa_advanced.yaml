apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wire-api-hpa-advanced
  namespace: default
  labels:
    app: wire-api
    tier: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wire-api
  minReplicas: 3
  maxReplicas: 50
  metrics:
    # Custom latency-based scaling (p99 < 50ms)
    - type: Pods
      pods:
        metric:
          name: http_request_latency_p99_ms
        target:
          type: AverageValue
          averageValue: "50"
    
    # CPU utilization with aggressive threshold
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    
    # Memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
    
    # Active connections per pod
    - type: Pods
      pods:
        metric:
          name: active_connections
        target:
          type: AverageValue
          averageValue: "1000"
  
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutes before scaling down
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
        - type: Pods
          value: 5
          periodSeconds: 60
      selectPolicy: Min
    
    scaleUp:
      stabilizationWindowSeconds: 0  # Scale up immediately
      policies:
        - type: Percent
          value: 100  # Double replicas if needed
          periodSeconds: 15
        - type: Pods
          value: 10
          periodSeconds: 15
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-worker-hpa
  namespace: default
  labels:
    app: wire-workers
    tier: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-worker
  minReplicas: 2
  maxReplicas: 100
  metrics:
    # Queue depth based scaling
    - type: External
      external:
        metric:
          name: redis_queue_length
          selector:
            matchLabels:
              queue: file_uploads
        target:
          type: AverageValue
          averageValue: "100"
  
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 200
          periodSeconds: 10
    scaleDown:
      stabilizationWindowSeconds: 600  # 10 minutes for workers
      policies:
        - type: Percent
          value: 20
          periodSeconds: 120
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hpa-custom-metrics-config
  namespace: default
data:
  metrics-config.yaml: |
    metrics:
      - name: http_request_latency_p99_ms
        query: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) * 1000
        description: "99th percentile HTTP request latency in milliseconds"
      
      - name: active_connections
        query: sum(wire_api_active_connections)
        description: "Total active WebSocket/gRPC connections"
      
      - name: redis_queue_length
        query: llen(redis_queue_file_uploads)
        description: "Length of file upload queue in Redis"
    
    scrapeInterval: 15s
    evaluationInterval: 15s
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-tuning-parameters
  namespace: default
data:
  tuning-parameters.yaml: |
    # Kubernetes node and pod tuning for high-performance workloads
    
    # Kubelet tuning
    kubelet:
      maxPods: 250
      podPidsLimit: 8192
      imageGCHighThresholdPercent: 80
      imageGCLowThresholdPercent: 60
      evictionHard:
        memory.available: "500Mi"
        nodefs.available: "10%"
        nodefs.inodesFree: "5%"
        imagefs.available: "15%"
      evictionSoft:
        memory.available: "1Gi"
        nodefs.available: "15%"
      evictionSoftGracePeriod:
        memory.available: "2m"
        nodefs.available: "2m"
    
    # Scheduler tuning
    scheduler:
      percentageOfNodesToScore: 50  # Don't score all nodes for faster scheduling
      podInitialBackoffSeconds: 1
      podMaxBackoffSeconds: 10
    
    # Controller manager tuning
    controllerManager:
      nodeMonitorGracePeriod: "10s"
      podEvictionTimeout: "30s"
      terminatingPodGracePeriod: 30
