apiVersion: v1
kind: ConfigMap
metadata:
  name: cilium-config
  namespace: kube-system
data:
  # Optimize for k3s, eBPF-based routing, no kube-proxy
  kube-proxy-replacement: "strict"
  enable-ipv4: "true"
  enable-ipv6: "false"
  monitor-aggregation: "medium"
  bpf-ct-global-tcp-max: "524288"
  bpf-ct-global-any-max: "262144"
