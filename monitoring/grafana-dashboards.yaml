apiVersion: v1
kind: ConfigMap
metadata:
  name: wire-grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  wire-system-dashboard.json: |
    {
      "title": "Wire Enterprise - System Metrics",
      "panels": [
        {
          "title": "API Request Latency (p99)",
          "type": "timeseries",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99 Latency"
            }
          ]
        },
        {
          "title": "Active Upload Sessions",
          "type": "stat",
          "targets": [
            {
              "expr": "sum(wire_active_upload_sessions)",
              "legendFormat": "Active Uploads"
            }
          ]
        }
      ]
    }
