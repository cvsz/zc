services:
  zc:
    build: .
    image: zcoder:local
    container_name: zc
    network_mode: host
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-false}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-false}
      API_HOST: 127.0.0.1
      API_PORT: "8000"
      API_WORKERS: "1"
      AI_PROVIDER: ${AI_PROVIDER:-litellm}
      LITELLM_CONFIG_PATH: /app/litellm-config.yaml
      LITELLM_MODEL: ${LITELLM_MODEL:-zc-default}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_ENABLED: "false"
      CHAT_SESSION_DIR: /app/data/chat/sessions
      NATS_ENABLED: "false"
      PROTOBUF_ENABLED: "false"
      OTEL_ENABLED: "false"
      FRONTEND_ENABLED: "true"
    volumes:
      - zc-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  zc-data:
