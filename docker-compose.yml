services:
  zc:
    build: .
    image: zaicoder:latest
    container_name: zc
    environment:
      - AI_PROVIDER=litellm
      - LITELLM_CONFIG_PATH=/app/litellm-config.yaml
      - LITELLM_MODEL=${LITELLM_MODEL:-zc-default}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - zc_LOG_FORMAT=json
      - zc_LOG_LEVEL=INFO
    volumes:
      - zc-home:/home/zc
    healthcheck:
      test: ["CMD", "python", "main.py", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  zc-home:
