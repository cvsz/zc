services:
  zcoder:
    build: .
    image: zcoder:latest
    container_name: zcoder
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in the environment or .env file}
      - ZCODER_LOG_FORMAT=json
      - ZCODER_LOG_LEVEL=INFO
    volumes:
      # Persist config/cache across container restarts without baking
      # secrets or state into the image.
      - zcoder-home:/home/zcoder
    healthcheck:
      test: ["CMD", "python", "main.py", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    # Interactive CLI usage: docker compose run --rm zcoder -p "..."
    stdin_open: true
    tty: true

volumes:
  zcoder-home:
